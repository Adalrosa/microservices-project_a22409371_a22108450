name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build catalog-service
        run: |
          cd services/catalog-service
          mvn clean package -DskipTests

      - name: Build order-service
        run: |
          cd services/order-service
          mvn clean package -DskipTests

      - name: Build notification-service
        run: |
          cd services/notification-service
          mvn clean package -DskipTests

      - name: Build Docker images
        run: |
          docker build -t catalog-service:${{ github.sha }} services/catalog-service
          docker build -t order-service:${{ github.sha }} services/order-service
          docker build -t notification-service:${{ github.sha }} services/notification-service

      - name: Terraform validation
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init and validate
        run: |
          cd infrastructure/terraform/environments/prod
          terraform init -backend=false
          terraform validate